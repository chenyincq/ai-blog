server:
  port: 8081
  address: 0.0.0.0

# 上传文件存储路径，建议使用绝对路径避免 Tomcat 临时目录问题
# 例如：/var/blog/uploads 或 ${user.home}/blog-uploads
blog:
  upload:
    path: ${user.home}/blog-uploads

spring:
  datasource:
    url: jdbc:mysql://{ip}:3402/blog_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: "{password}"
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  application:
    name: blog-post-service
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

logging:
  level:
    root: info
