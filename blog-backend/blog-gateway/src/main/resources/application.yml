server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: blog-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:5174"
              - "http://127.0.0.1:5175"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth
          uri: http://localhost:8082
          predicates:
            - Path=/api/auth/**
        - id: posts
          uri: http://localhost:8081
          predicates:
            - Path=/api/posts,/api/posts/**
        - id: friend-links
          uri: http://localhost:8081
          predicates:
            - Path=/api/friend-links/**
        - id: home-banners
          uri: http://localhost:8081
          predicates:
            - Path=/api/home-banners/**

logging:
  level:
    root: info
    org.springframework.cloud.gateway: debug
